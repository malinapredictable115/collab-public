name: "CLA Assistant"

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    if: github.repository == 'collaborator-ai/collab-public'
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Assistant"
        if: |
          github.event.comment.body == 'recheck' ||
          github.event.comment.body == 'I have read the Contributor License Agreement (CLA) and hereby sign the CLA.' ||
          github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@58daaf842ac3e26d08c2bdf26770d6e9c5b965a9
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          path-to-signatures: ".github/cla-signatures.json"
          path-to-document: "https://github.com/collaborator-ai/collab-public/blob/main/CLA.md"
          branch: "main"
          allowlist: yiliushenburke,dependabot[bot],Copilot
          custom-pr-sign-comment: "I have read the Contributor License Agreement (CLA) and hereby sign the CLA."
          custom-notsigned-prcomment: "Thank you for your submission! Like many open-source projects, we ask that you sign our [Contributor License Agreement](https://github.com/collaborator-ai/collab-public/blob/main/CLA.md) before we can accept your contribution. You can sign the CLA by posting the following comment on this PR:"
          lock-pullrequest-aftermerge: false
          signed-commit-message: "chore(legal): @$contributorName has signed the CLA"
